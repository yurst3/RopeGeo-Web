AWSTemplateFormatVersion: '2010-09-09'
Description: HTTP API for explore page Lambda (OpenAPI from S3)

Resources:
  RopeGeoWebApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      BodyS3Location:
        Bucket:
          Ref: DocsBucketName
        Key: openapiResolved.yaml

  RopeGeoWebApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId:
        Ref: RopeGeoWebApi
      StageName: $default
      AutoDeploy: true
      Description: Default stage for RopeGeo-Web explore API

Outputs:
  RopeGeoWebApiId:
    Description: API ID (execute-api hostname)
    Value:
      Ref: RopeGeoWebApi
  RopeGeoWebApiEndpoint:
    Description: Regional API endpoint URL
    Value:
      'Fn::GetAtt':
        - RopeGeoWebApi
        - ApiEndpoint
