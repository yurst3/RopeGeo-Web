AWSTemplateFormatVersion: '2010-09-09'
Description: IAM role for API Gateway to invoke explore Lambda

Resources:
  ApiGatewayInvokeLambdaRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: 'sts:AssumeRole'
      Policies:
        - PolicyName: InvokeExplorePageLambda
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 'lambda:InvokeFunction'
                Resource:
                  'Fn::GetAtt': ExplorePage.Arn
      Tags:
        - Key: Name
          Value:
            'Fn::Sub': '${AWS::StackName}-apig-invoke-explore'
  ExplorePageApiGatewayPermission:
    Type: 'AWS::Lambda::Permission'
    Properties:
      FunctionName:
        Ref: ExplorePage
      Action: 'lambda:InvokeFunction'
      Principal: apigateway.amazonaws.com

Outputs:
  ApiGatewayInvokeLambdaRoleArn:
    Description: ARN for API Gateway Lambda invoke role (OpenAPI integration credentials)
    Value:
      'Fn::GetAtt': ApiGatewayInvokeLambdaRole.Arn
