AWSTemplateFormatVersion: '2010-09-09'
Description: IAM role for explore page Lambda (S3 read landing, logs)

Resources:
  ExplorePageRole:
    Type: 'AWS::IAM::Role'
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole'
      Policies:
        - PolicyName: ReadLandingIndex
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 's3:GetObject'
                Resource:
                  'Fn::Sub':
                    - '${BucketArn}/*'
                    - BucketArn:
                        'Fn::GetAtt': LandingSiteBucket.Arn
      Tags:
        - Key: Name
          Value:
            'Fn::Sub': '${AWS::StackName}-explore-page'
